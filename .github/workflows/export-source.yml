name: export-source
on:
  pull_request:
    branches: [main]

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: wikiforge-source
          path: |
            .
            !.git/**
          include-hidden-files: true
          retention-days: 1
