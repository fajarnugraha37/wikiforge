name: apply-phase1
on:
  push:
    branches: [feat/phase1-adaptive-planning]
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull-requests: read

concurrency:
  group: apply-phase1
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/phase1-adaptive-planning
          fetch-depth: 0

      - name: Reconstruct and verify patch
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA256: f6f9f6d66b62940c96650f95ee179837ddedbf45217e153f5289a36b59bb6513
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import re
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          pattern = re.compile(
              r"^WIKIFORGE_PHASE1_PATCH_PART (\d{2})/19\n(.*?)(?=^WIKIFORGE_PHASE1_PATCH_PART \d{2}/19\n|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          parts = {}
          page = 1
          while True:
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/issues/2/comments?per_page=100&page={page}",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  comments = json.load(response)
              if not comments:
                  break
              for comment in comments:
                  for match in pattern.finditer(comment.get("body") or ""):
                      number = int(match.group(1))
                      if number in parts:
                          raise SystemExit(f"duplicate patch part {number:02d}")
                      parts[number] = match.group(2)
              if len(comments) < 100:
                  break
              page += 1

          expected = list(range(1, 20))
          if sorted(parts) != expected:
              raise SystemExit(f"patch parts mismatch: found={sorted(parts)} expected={expected}")
          patch = "".join(parts[number] for number in expected).encode("utf-8")
          digest = hashlib.sha256(patch).hexdigest()
          if digest != os.environ["EXPECTED_SHA256"]:
              raise SystemExit(f"patch checksum mismatch: {digest}")
          with open("/tmp/phase1.patch", "wb") as handle:
              handle.write(patch)
          print(f"verified {len(patch)} bytes sha256={digest}")
          PY

      - name: Apply patch and run verification
        run: |
          git apply --check /tmp/phase1.patch
          git apply --index --whitespace=error-all /tmp/phase1.patch
          rm .github/workflows/apply-phase1.yml
          git add -A
          git diff --cached --check
          go test -count=1 ./...
          go vet ./...
          go test -race -count=1 ./...
          go build ./cmd/wikiforge

      - name: Commit final Phase 1 tree
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "feat: add adaptive planning foundation"
          git push origin HEAD:feat/phase1-adaptive-planning
