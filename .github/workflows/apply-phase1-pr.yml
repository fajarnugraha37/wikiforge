name: apply-phase1-pr
on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: read
  pull-requests: read

concurrency:
  group: apply-phase1-pr
  cancel-in-progress: false

jobs:
  apply:
    if: github.head_ref == 'feat/phase1-adaptive-planning'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/phase1-adaptive-planning
          fetch-depth: 0

      - name: Reconstruct patch parts
        id: reconstruct
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import re
          import traceback
          import urllib.request

          diagnostics = {"found": [], "duplicates": [], "error": "", "digest": "", "bytes": 0}
          try:
              repo = os.environ["GITHUB_REPOSITORY"]
              token = os.environ["GH_TOKEN"]
              pattern = re.compile(
                  r"^WIKIFORGE_PHASE1_PATCH_PART (\d{2})/19\n(.*?)(?=^WIKIFORGE_PHASE1_PATCH_PART \d{2}/19\n|\Z)",
                  re.MULTILINE | re.DOTALL,
              )
              parts = {}
              page = 1
              while True:
                  request = urllib.request.Request(
                      f"https://api.github.com/repos/{repo}/issues/2/comments?per_page=100&page={page}",
                      headers={
                          "Accept": "application/vnd.github+json",
                          "Authorization": f"Bearer {token}",
                          "X-GitHub-Api-Version": "2022-11-28",
                      },
                  )
                  with urllib.request.urlopen(request) as response:
                      comments = json.load(response)
                  if not comments:
                      break
                  for comment in comments:
                      for match in pattern.finditer(comment.get("body") or ""):
                          number = int(match.group(1))
                          if number in parts:
                              diagnostics["duplicates"].append(number)
                          else:
                              parts[number] = match.group(2)
                  if len(comments) < 100:
                      break
                  page += 1

              diagnostics["found"] = sorted(parts)
              expected = list(range(1, 20))
              if diagnostics["duplicates"]:
                  raise RuntimeError(f"duplicate patch parts: {diagnostics['duplicates']}")
              if sorted(parts) != expected:
                  raise RuntimeError(f"patch parts mismatch: found={sorted(parts)} expected={expected}")
              patch = "".join(parts[number] for number in expected).encode("utf-8")
              diagnostics["digest"] = hashlib.sha256(patch).hexdigest()
              diagnostics["bytes"] = len(patch)
              with open("/tmp/phase1.patch", "wb") as handle:
                  handle.write(patch)
          except Exception as exc:
              diagnostics["error"] = f"{type(exc).__name__}: {exc}"
              diagnostics["traceback"] = traceback.format_exc()
          finally:
              with open("/tmp/phase1-diagnostics.json", "w", encoding="utf-8") as handle:
                  json.dump(diagnostics, handle, indent=2, sort_keys=True)
                  handle.write("\n")
              print(json.dumps(diagnostics, sort_keys=True))
          if diagnostics["error"]:
              raise SystemExit(1)
          PY

      - name: Upload reconstruction diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase1-reconstruction
          path: |
            /tmp/phase1-diagnostics.json
            /tmp/phase1.patch
          if-no-files-found: warn
          retention-days: 1

      - name: Apply and verify Phase 1
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          git apply --check /tmp/phase1.patch
          git apply --index --whitespace=error-all /tmp/phase1.patch
          rm -f .github/workflows/apply-phase1.yml .github/workflows/apply-phase1-pr.yml
          git add -A
          git diff --cached --check
          go test -count=1 ./...
          go vet ./...
          go test -race -count=1 ./...
          go build ./cmd/wikiforge

      - name: Commit final Phase 1 tree
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "feat: add adaptive planning foundation"
          git push origin HEAD:feat/phase1-adaptive-planning
