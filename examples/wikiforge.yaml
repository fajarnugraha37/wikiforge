version: 3
workspace: .

openwiki:
  # Pinned for reproducible runs. Replace with your approved command/model.
  command: npx
  args:
    - --yes
    - openwiki@0.2.0
    - code
  modelId: ""
  timeoutMinutes: 60
  environment:
    OPENWIKI_TELEMETRY_DISABLED: "1"
    OPENWIKI_PROVIDER_RETRY_ATTEMPTS: "3"

execution:
  # Scoped components sharing one repository use isolated staging worktrees.
  parallelComponents: 2
  maxProcessRetries: 2
  maxRepairRounds: 2
  continueOnComponentFailure: true
  isolateSameRepository: true

documentation:
  language: English
  views:
    - system
    - domain
    - component
    - flow
    - catalog
    - platform
    - engineering
    - operations
  catalogs:
    shardBy:
      - domain
    maximumRowsPerPage: 150
    maximumBytesPerPage: 524288
  evidence:
    include:
      - src/**
      - config/**
      - deploy/**
    exclude:
      - vendor/**
      - generated/**
      - "**/*.bin"
    cacheDirectory: ./.wikiforge/cache/evidence
    maxFileBytes: 4194304
  frontMatterPolicy: namespaced
  requireVerifiedEvidence: true
  requireCatalogIdentity: true
  requireRelationshipEvidence: true
  minimumQualityScore: 85
  # 0 = use planner defaults.
  minimumPages: 0
  requireFrontMatter: true
  requireSourceReferences: true
  validateSourcePaths: true
  requireMermaid: true
  # 0 = use planner defaults.
  minimumMermaidBlocks: 0
  allowedDiagramTypes:
    - flowchart
    - sequenceDiagram
    - stateDiagram-v2
    - erDiagram
    - classDiagram
    - architecture-beta
    - gitGraph
    - mindmap

mermaid:
  # render = parse every Mermaid block with the pinned official CLI.
  # basic = offline structural checks only.
  # off = do not validate Mermaid.
  mode: render
  command: npx
  args:
    - --yes
    - "@mermaid-js/mermaid-cli@11.12.0"
    - -i
    - "{input}"
    - -o
    - "{output}"
    - --quiet
  timeoutSeconds: 90

# A component is any independently documented repository scope. Multiple
# components may share one repository by using different relative scopes.
components:
  # Conventional microservice repository.
  - id: order-service
    type: microservice
    repository: ./repositories/order-service
    enabled: false
    group: commerce
    owners: [commerce-team]
    tags: [order, deployable]
    capabilities: [order-management]
    packs: [telemetry]
    dependsOn: [shared-contracts]

  # Entire monolith repository.
  - id: commerce-monolith
    type: monolith
    repository: ./repositories/commerce-monolith
    enabled: false

  # Modular monolith with module-aware documentation.
  - id: commerce-core
    type: modular-monolith
    repository: ./repositories/commerce-core
    enabled: false
    capabilities: [order-management, pricing, fulfilment]

  # Multiple scoped components inside one monorepo.
  - id: catalog-app
    type: microservice
    repository: ./repositories/platform-monorepo
    scope: apps/catalog
    enabled: false

  - id: shared-runtime
    type: framework
    repository: ./repositories/platform-monorepo
    scope: packages/runtime
    enabled: false

  - id: shared-contracts
    type: contracts
    repository: ./repositories/platform-monorepo
    scope: contracts
    enabled: false

  # Infrastructure/IaC/GitOps repository.
  - id: production-infrastructure
    type: iac
    repository: ./repositories/production-infrastructure
    enabled: false

  # Shared configuration repository.
  - id: platform-configuration
    type: configuration
    repository: ./repositories/platform-configuration
    enabled: false

documentationUnits:
  - id: order-management
    component: commerce-core
    kind: domain
    sourceRoots:
      - modules/order
      - workflows/order
    output: domains/order-management

  - id: submit-order
    component: commerce-core
    kind: flow
    sourceRoots:
      - workflows/order
    relatedUnits:
      - order-management
    output: flows/submit-order

system:
  enabled: true
  id: enterprise-system
  title: Enterprise System
  output: ./enterprise-wiki
  # Optional human-authored facts copied into the aggregation workspace.
  factsPath: ./facts
